<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In — AirBrush</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
* { font-family: 'Calibri Light', Calibri, sans-serif !important; }

#particles-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a0f;
  padding: 2rem;
  position: relative;
}

.auth-card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px;
  padding: 2.75rem 2.5rem;
  width: 100%;
  max-width: 440px;
  backdrop-filter: blur(20px);
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 2rem;
  text-decoration: none;
}
.auth-logo span {
  font-size: 1.2rem;
  font-weight: 700;
  color: #f0f0f8;
  letter-spacing: -0.3px;
}

.auth-card h2 {
  font-size: 1.75rem;
  font-weight: 700;
  color: #f0f0f8;
  margin-bottom: 0.5rem;
  letter-spacing: -0.5px;
}
.auth-card > p {
  color: #8888aa;
  font-size: 0.97rem;
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1.25rem;
}
.form-group label {
  display: block;
  font-size: 0.88rem;
  color: rgba(255,255,255,0.55);
  margin-bottom: 0.45rem;
  letter-spacing: 0.02em;
}
.form-group input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #f0f0f8;
  padding: 0.7rem 0.95rem;
  font-size: 0.97rem;
  outline: none;
  transition: border-color 0.2s;
  box-sizing: border-box;
}
.form-group input:focus {
  border-color: rgba(124,58,237,0.6);
  background: rgba(124,58,237,0.05);
}
.form-group input::placeholder { color: rgba(255,255,255,0.25); }

.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, #7C3AED, #06B6D4);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0.8rem;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity 0.2s, transform 0.15s;
}
.btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }

.auth-footer {
  text-align: center;
  color: #8888aa;
  font-size: 0.93rem;
  margin-top: 1.75rem;
}
.auth-footer a { color: #06B6D4; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" stroke="url(#llg1)" stroke-width="1.5"/>
        <path d="M8 22 Q12 10 16 14 Q20 18 24 8" stroke="url(#llg2)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="24" cy="8" r="2.5" fill="url(#llg2)"/>
        <defs>
          <linearGradient id="llg1" x1="0" y1="0" x2="32" y2="32">
            <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#06B6D4"/>
          </linearGradient>
          <linearGradient id="llg2" x1="8" y1="22" x2="24" y2="8">
            <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
      </svg>
      <span>AirBrush</span>
    </a>

    <h2>Welcome back</h2>
    <p>Log in to your AirBrush account.</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="li-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="li-password" placeholder="Your password"/>
    </div>

    <button class="btn-submit" id="email-login-btn">Log In</button>

    <p class="auth-footer">
      New here? <a href="signup.html">Create an Account</a>
    </p>
  </div>
</div>

<script>
'use strict';

/* ── Particles ── */
(function() {
  const canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function makeP() { return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.8+0.4, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4, a:Math.random()*0.4+0.1 }; }
  function init() { resize(); particles = Array.from({length:100}, makeP); }
  function draw() {
    ctx.clearRect(0,0,W,H);
    for (const p of particles) {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(124,58,237,${p.a})`; ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1; if(p.y<0||p.y>H) p.vy*=-1;
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  init(); draw();
})();

/* ── Utilities ── */
function getUsers() {
  try { return JSON.parse(localStorage.getItem('ab_users') || '[]'); } catch { return []; }
}
function findUser(email) { return getUsers().find(u => u.email === email.toLowerCase()); }

function toast(msg, type='info') {
  let el = document.getElementById('ab-toast');
  if (!el) {
    el = document.createElement('div'); el.id = 'ab-toast';
    Object.assign(el.style, {
      position:'fixed',bottom:'28px',left:'50%',transform:'translateX(-50%)',
      padding:'11px 24px',borderRadius:'10px',fontSize:'0.97rem',color:'#fff',
      zIndex:'9999',pointerEvents:'none',fontFamily:"'Calibri Light',Calibri,sans-serif",
      transition:'opacity 0.3s',opacity:'0',whiteSpace:'nowrap'
    });
    document.body.appendChild(el);
  }
  const colors = { info:'#7C3AED', success:'#16a34a', error:'#dc2626' };
  el.style.background = colors[type] || colors.info;
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

/* ── Login ── */
document.getElementById('email-login-btn').addEventListener('click', () => {
  const email = document.getElementById('li-email').value.trim().toLowerCase();
  const pass  = document.getElementById('li-password').value;

  if (!email) { toast('Please enter your email', 'error'); return; }
  if (!pass)  { toast('Please enter your password', 'error'); return; }

  const user = findUser(email);
  if (!user)                { toast('No account found with this email', 'error'); return; }
  if (user.password !== pass){ toast('Incorrect password', 'error'); return; }

  localStorage.setItem('ab_current', JSON.stringify({ email, name: user.name }));
  toast(`Welcome back, ${user.name}!`, 'success');
  setTimeout(() => window.location.href = 'canvas.html', 1000);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('email-login-btn').click();
});
</script>
</body>
</html>
